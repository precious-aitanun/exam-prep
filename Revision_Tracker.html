<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Revision Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EAEEF2; --surface:#FFFFFF; --ink:#16212B; --muted:#5E6E7A;
    --line:#E2E8ED; --og:#B5476A; --pd:#1F8A82; --cm:#4A5BB0; --ring:#0F1A22;
    --shadow:0 1px 2px rgba(16,30,40,.06),0 8px 24px rgba(16,30,40,.06);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--ink);
    font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  .wrap{max-width:760px;margin:0 auto;padding:0 14px 96px}
  .mono{font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums}
  .disp{font-family:'Space Grotesk',Inter,sans-serif}

  header.top{position:sticky;top:0;z-index:30;background:rgba(234,238,242,.86);
    backdrop-filter:blur(10px);padding:14px 0 10px;margin:0 -14px;padding-left:14px;padding-right:14px}
  .title{font-family:'Space Grotesk';font-weight:700;font-size:19px;letter-spacing:-.02em}
  .sub{color:var(--muted);font-size:12.5px;margin-top:1px}

  .chart{background:var(--surface);border:1px solid var(--line);border-radius:16px;
    padding:14px 15px;margin-top:11px;box-shadow:var(--shadow)}
  .ov-head{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
  .ov-num{font-family:'Space Grotesk';font-weight:700;font-size:30px;letter-spacing:-.02em;line-height:1}
  .ov-num small{font-size:14px;color:var(--muted);font-weight:600}
  .ov-pct{font-family:'IBM Plex Mono';font-weight:600;font-size:13px;color:var(--muted)}
  .track{height:9px;border-radius:6px;background:#DCE3E9;overflow:hidden;margin-top:11px;display:flex}
  .track i{display:block;height:100%}
  .legend{display:flex;gap:8px;margin-top:12px}
  .lg{flex:1;border:1px solid var(--line);border-radius:11px;padding:8px 9px}
  .lg .lbl{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--muted)}
  .dot{width:9px;height:9px;border-radius:50%;flex:none}
  .lg .cnt{font-family:'IBM Plex Mono';font-weight:600;font-size:14px;margin-top:5px}
  .lg .mini{height:5px;border-radius:4px;background:#DCE3E9;margin-top:6px;overflow:hidden}
  .lg .mini i{display:block;height:100%;border-radius:4px}

  .controls{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px;align-items:center}
  .chip{border:1px solid var(--line);background:var(--surface);color:var(--ink);
    font-family:Inter;font-weight:600;font-size:12.5px;padding:7px 12px;border-radius:999px;cursor:pointer}
  .chip[aria-pressed="true"]{background:var(--ink);color:#fff;border-color:var(--ink)}
  .chip.og[aria-pressed="true"]{background:var(--og);border-color:var(--og)}
  .chip.pd[aria-pressed="true"]{background:var(--pd);border-color:var(--pd)}
  .chip.cm[aria-pressed="true"]{background:var(--cm);border-color:var(--cm)}
  .spacer{flex:1}
  .ghost{border:none;background:none;color:var(--muted);font-weight:600;font-size:12.5px;cursor:pointer;padding:6px}

  .day{background:var(--surface);border:1px solid var(--line);border-radius:16px;
    margin-top:12px;overflow:hidden;box-shadow:var(--shadow)}
  .day-h{display:flex;align-items:center;gap:11px;padding:13px 15px;cursor:pointer;user-select:none}
  .dnum{font-family:'Space Grotesk';font-weight:700;font-size:12px;letter-spacing:.04em;
    color:#fff;background:var(--ring);border-radius:8px;padding:5px 8px;flex:none}
  .dmeta{flex:1;min-width:0}
  .dtheme{font-family:'Space Grotesk';font-weight:600;font-size:14.5px;letter-spacing:-.01em;line-height:1.25}
  .dcount{font-family:'IBM Plex Mono';font-weight:600;font-size:12px;color:var(--muted);margin-top:3px}
  .chev{flex:none;color:var(--muted);transition:transform .2s ease}
  .day.open .chev{transform:rotate(90deg)}
  .day-body{display:none;padding:2px 9px 10px}
  .day.open .day-body{display:block}

  .grp{margin:8px 6px 2px}
  .grp-h{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;
    letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:10px 4px 4px}
  .row{display:flex;align-items:flex-start;gap:11px;padding:10px 8px;border-radius:11px;cursor:pointer}
  .row:active{background:#F2F5F8}
  .box{width:21px;height:21px;border-radius:7px;border:2px solid #C2CDD6;flex:none;margin-top:1px;
    display:grid;place-items:center;transition:all .12s ease;background:#fff}
  .box svg{width:13px;height:13px;opacity:0;transform:scale(.6);transition:all .12s ease}
  .row.done .box svg{opacity:1;transform:scale(1)}
  .lab{font-size:14.5px;line-height:1.35;font-weight:500}
  .row.done .lab{color:var(--muted);text-decoration:line-through;text-decoration-thickness:1.5px}

  footer{position:fixed;left:0;right:0;bottom:0;z-index:30;background:rgba(234,238,242,.9);
    backdrop-filter:blur(10px);border-top:1px solid var(--line)}
  .foot{max-width:760px;margin:0 auto;display:flex;align-items:center;gap:12px;padding:11px 16px;
    padding-bottom:calc(11px + env(safe-area-inset-bottom))}
  .foot .st{font-family:'IBM Plex Mono';font-size:12px;color:var(--muted);flex:1}
  .reset{border:1px solid var(--line);background:var(--surface);color:var(--ink);
    font-weight:600;font-size:12.5px;padding:8px 14px;border-radius:999px;cursor:pointer}
  :focus-visible{outline:2.5px solid var(--cm);outline-offset:2px;border-radius:8px}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="title">Two-Week Revision Tracker</div>
    <div class="sub">O&G · Paediatrics · Community Medicine — every topic, tick as you go</div>

    <div class="chart">
      <div class="ov-head">
        <div class="ov-num"><span id="ovDone">0</span><small> / <span id="ovTot">0</span> topics</small></div>
        <div class="ov-pct"><span id="ovPct">0</span>% done</div>
      </div>
      <div class="track" id="ovTrack"></div>
      <div class="legend" id="legend"></div>
    </div>

    <div class="controls">
      <button class="chip" data-f="all" aria-pressed="true">All</button>
      <button class="chip og" data-f="og" aria-pressed="false">O&G</button>
      <button class="chip pd" data-f="pd" aria-pressed="false">Paeds</button>
      <button class="chip cm" data-f="cm" aria-pressed="false">Comm Med</button>
      <span class="spacer"></span>
      <button class="ghost" id="hideDone">Hide done</button>
      <button class="ghost" id="toggleAll">Collapse all</button>
    </div>
  </header>

  <main id="days"></main>
</div>

<footer>
  <div class="foot">
    <div class="st" id="status">Loading…</div>
    <button class="reset" id="reset">Reset progress</button>
  </div>
</footer>

<script>
const DAYS = [{"theme":"Obstetric & neonatal emergencies · Biostatistics core","og":["Antepartum haemorrhage","Postpartum haemorrhage (primary & secondary)","Birth asphyxia (obstetric)"],"pd":["Neonatal jaundice","Neonatal sepsis","Perinatal asphyxia","Childhood morbidity & mortality"],"cm":["Rate, ratio & proportion","Inferential / inductive statistics","Biostatistics"]},{"theme":"Hypertensive & medical pregnancy · Neonatology II","og":["Chronic hypertension in pregnancy","Malaria in pregnancy","Cardiac disease in pregnancy"],"pd":["Neonatal seizures","Neonatal tetanus","Neonatal cholestasis","Physical characteristics & behaviour of normal neonates"],"cm":["Epidemiology — general principles","Standardization of rates","Demography","Psyche"]},{"theme":"Medical disorders in pregnancy II · Paediatric nephrology I","og":["UTI in pregnancy","Jaundice in pregnancy","Rhesus disease","Coagulation & fibrinolysis in pregnancy"],"pd":["Acute glomerulonephritis","Nephrotic syndrome","UTI in children","Congenital anomalies of the kidneys"],"cm":["Epidemiology & control of VHFs","Airborne infections — measles, mumps & rubella","Dengue fever"]},{"theme":"Labour I · Paediatric nephrology II","og":["Labour","Mechanism of labour","Obstructed labour","Pain relief in labour"],"pd":["Acute kidney injury","Chronic kidney disease","Childhood hypertension","Signs & symptoms of urinary tract disorders"],"cm":["Safe motherhood initiative","Family planning","At-risk concept in maternal & child health"]},{"theme":"Labour II & perineum · Paediatric GIT & nutrition","og":["Breech presentation","Cervical incompetence","Obstetric anal sphincter injury"],"pd":["Diarrhoea","Fluid & electrolyte disturbances","Protein-energy malnutrition","Childhood obesity"],"cm":["National breastfeeding policy & baby-friendly initiative","Health needs of a child & infant welfare clinic","School health programme"]},{"theme":"Multiple & fetal pregnancy · Paediatric cardiology I","og":["Multiple pregnancy","Polyhydramnios & oligohydramnios","IUGR & IUFD"],"pd":["Common congenital heart disease","Tetralogy of Fallot","Congestive heart failure in infants & children","Signs & symptoms of cardiovascular disease","Integrated child health services (PHC concept)"],"cm":["Introduction to public health","Nigerian national population policy","Culture & health"]},{"theme":"Early pregnancy & trophoblastic · Rheumatic heart · PHC","og":["Abortion / miscarriage","Gestational trophoblastic disease","Gestational trophoblastic neoplasia"],"pd":["Acute rheumatic fever","Rheumatic heart disease","History taking in paediatrics","Counselling in paediatrics","Ethics in paediatric care"],"cm":["Primary health care","Bamako initiative","Health services","Doctor–patient relationship"]},{"theme":"Genital tract infections · Paediatric respiratory & infections","og":["Sexually transmitted infections","Vaginal discharge","Bacterial vaginosis","Female genital mutilation"],"pd":["Pneumonia, bronchiectasis & lung abscess","Tuberculosis","Malaria","Signs & symptoms of respiratory disease"],"cm":["Introduction to environmental health","Water supply & purification","Vector control","Epidemiology of healthcare-associated infections"]},{"theme":"Menstrual & endocrine gynaecology · Infections II","og":["Infertility","Amenorrhoea","Menopause","Endometriosis"],"pd":["Enteric fever","Infectious hepatitis","IMCI","Management of a critically ill child","Sustainable Development Goals (SDGs)"],"cm":["Housing & health","Occupational cancers","Pneumoconiosis","Hazards"]},{"theme":"Gynaecological tumours · Paediatric endocrine","og":["Ovarian tumours","Uterine fibroid","Endometrial hyperplasia","Malignant disease of the uterus","Benign tumours of the cervix"],"pd":["Thyroid disorders","Diabetes mellitus in children & adolescents","Congenital adrenal hyperplasia","Signs & symptoms of endocrine disease"],"cm":["Biological & environmental monitoring","Port health","Ageing & health"]},{"theme":"Urogynaecology · Metabolic / IEM · NCD epidemiology","og":["Control of micturition & urinary incontinence","Urge incontinence","Gynaecological disorders in childhood & adolescence"],"pd":["Inborn errors of metabolism","Galactosaemia","Phenylketonuria (PKU)","Prescribing for children"],"cm":["Epidemiology & control of malignant diseases","Epidemiology of PUD, asthma & albinism","Epidemiology of SCD & Down syndrome","Rehabilitation"]},{"theme":"O&G foundations · Paediatric neurology & MSK · Research methods","og":["Anatomy of the female pelvis & fetal skull","Development of the female genital tract","Physiology of puberty","Menstrual cycle","Basic genetics in obstetrics"],"pd":["Cerebral palsy","Acute flaccid paralysis","Musculoskeletal diseases","Orthopaedic diseases in childhood","Signs & symptoms of the musculoskeletal system"],"cm":["Research methods","Conducting & documenting a literature search","Sampling techniques"]},{"theme":"Operative O&G & maternal health · Paediatric genetics & blood","og":["Maternal mortality","Imaging in O&G","Principles & pre/post-operative care in O&G","Endoscopy","Problems of the primigravida & multigravida","Philosophy & need for family planning"],"pd":["Down syndrome","Development & function of the formed elements of blood","Growth standards & monitoring","Patterns of development of the normal child (1st year)","Paediatric gynaecological disorders","Ophthalmological diseases in childhood"],"cm":["Research integrity / responsible conduct of research","AI in medicine"]},{"theme":"Catch-up & psychosocial · Surgical paeds · Social medicine","og":["Postpartum depression"],"pd":["Surgical emergencies in children","Congenital GIT anomalies","Lecture note on health services","Right of a child"],"cm":["Ethics & jurisprudence","Social deviances","Theories of social deviance"]}];
const SUBJ = {"og":{"name":"Obstetrics & Gynaecology","short":"O&G","color":"#B5476A"},"pd":{"name":"Paediatrics","short":"Paeds","color":"#1F8A82"},"cm":{"name":"Community Medicine","short":"Comm Med","color":"#4A5BB0"}};
const ORDER = ["og","pd","cm"];
const KEY = "revtracker:v1";

let state = {};        // id -> true
let filter = "all";
let hideDone = false;
let allOpen = true;

// ---- persistence (artifact storage, with safe fallback) ----
async function load(){
  try{
    if(window.storage){
      const r = await window.storage.get(KEY);
      if(r && r.value) state = JSON.parse(r.value);
    }
  }catch(e){ state = {}; }
}
let saveTimer=null;
function save(){
  if(saveTimer) clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    try{ if(window.storage) await window.storage.set(KEY, JSON.stringify(state)); }
    catch(e){ setStatus("Couldn't save — progress kept for this session only."); }
  },200);
}

const tid=(d,s,i)=>"d"+d+"-"+s+"-"+i;
function counts(){
  const c={all:{d:0,t:0},og:{d:0,t:0},pd:{d:0,t:0},cm:{d:0,t:0}};
  DAYS.forEach((day,di)=>ORDER.forEach(s=>day[s].forEach((_,i)=>{
    const done=!!state[tid(di,s,i)];
    c[s].t++; c.all.t++; if(done){c[s].d++; c.all.d++;}
  })));
  return c;
}
function dayCounts(di){
  let d=0,t=0;
  ORDER.forEach(s=>DAYS[di][s].forEach((_,i)=>{t++; if(state[tid(di,s,i)])d++;}));
  return {d,t};
}

function setStatus(msg){ document.getElementById("status").textContent=msg; }

function renderChart(){
  const c=counts();
  document.getElementById("ovDone").textContent=c.all.d;
  document.getElementById("ovTot").textContent=c.all.t;
  document.getElementById("ovPct").textContent=c.all.t?Math.round(100*c.all.d/c.all.t):0;
  const tr=document.getElementById("ovTrack"); tr.innerHTML="";
  ORDER.forEach(s=>{
    const seg=document.createElement("i");
    seg.style.width=(100*c[s].d/(c.all.t||1))+"%";
    seg.style.background=SUBJ[s].color;
    tr.appendChild(seg);
  });
  const lg=document.getElementById("legend"); lg.innerHTML="";
  ORDER.forEach(s=>{
    const pct=c[s].t?Math.round(100*c[s].d/c[s].t):0;
    const el=document.createElement("div"); el.className="lg";
    el.innerHTML='<div class="lbl"><span class="dot" style="background:'+SUBJ[s].color+'"></span>'+SUBJ[s].short+'</div>'+
      '<div class="cnt">'+c[s].d+'/'+c[s].t+'</div>'+
      '<div class="mini"><i style="width:'+pct+'%;background:'+SUBJ[s].color+'"></i></div>';
    lg.appendChild(el);
  });
}

const CHECK='<svg viewBox="0 0 24 24" fill="none"><path d="M5 12.5l4.2 4.2L19 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>';

function renderDays(){
  const root=document.getElementById("days"); root.innerHTML="";
  DAYS.forEach((day,di)=>{
    const dc=dayCounts(di);
    const card=document.createElement("section");
    card.className="day"+(allOpen?" open":"");
    card.dataset.day=di;

    const head=document.createElement("div"); head.className="day-h";
    head.innerHTML='<span class="dnum">DAY '+(di+1)+'</span>'+
      '<div class="dmeta"><div class="dtheme">'+day.theme+'</div>'+
      '<div class="dcount">'+dc.d+' / '+dc.t+' done</div></div>'+
      '<svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    head.onclick=()=>card.classList.toggle("open");
    card.appendChild(head);

    const body=document.createElement("div"); body.className="day-body";
    ORDER.forEach(s=>{
      if(filter!=="all"&&filter!==s) return;
      const items=day[s];
      const grp=document.createElement("div"); grp.className="grp";
      const gh=document.createElement("div"); gh.className="grp-h";
      gh.innerHTML='<span class="dot" style="background:'+SUBJ[s].color+'"></span>'+SUBJ[s].name;
      grp.appendChild(gh);
      items.forEach((t,i)=>{
        const id=tid(di,s,i), done=!!state[id];
        if(hideDone&&done) return;
        const row=document.createElement("div");
        row.className="row"+(done?" done":""); row.tabIndex=0;
        row.setAttribute("role","checkbox"); row.setAttribute("aria-checked",done);
        const box=document.createElement("div"); box.className="box";
        if(done) box.style.background=SUBJ[s].color, box.style.borderColor=SUBJ[s].color;
        box.innerHTML=CHECK;
        const lab=document.createElement("div"); lab.className="lab"; lab.textContent=t;
        row.appendChild(box); row.appendChild(lab);
        const toggle=()=>{
          if(state[id]) delete state[id]; else state[id]=true;
          save(); refresh();
        };
        row.onclick=toggle;
        row.onkeydown=e=>{ if(e.key===" "||e.key==="Enter"){e.preventDefault();toggle();} };
        grp.appendChild(row);
      });
      if(grp.querySelectorAll(".row").length) body.appendChild(grp);
    });
    card.appendChild(body);
    root.appendChild(card);
  });
}

function refresh(){
  // preserve which cards are open
  const open=[...document.querySelectorAll(".day.open")].map(c=>c.dataset.day);
  renderChart(); renderDays();
  open.forEach(d=>{const el=document.querySelector('.day[data-day="'+d+'"]'); if(el)el.classList.add("open");});
  const c=counts();
  setStatus(c.all.d===c.all.t&&c.all.t>0 ? "All done — go smash the exam." : "Progress saves automatically.");
}

// controls
document.querySelectorAll(".chip").forEach(ch=>ch.onclick=()=>{
  filter=ch.dataset.f;
  document.querySelectorAll(".chip").forEach(x=>x.setAttribute("aria-pressed", x===ch));
  allOpen=true; refresh();
});
document.getElementById("hideDone").onclick=function(){
  hideDone=!hideDone; this.textContent=hideDone?"Show done":"Hide done"; refresh();
};
document.getElementById("toggleAll").onclick=function(){
  allOpen=!allOpen;
  document.querySelectorAll(".day").forEach(c=>c.classList.toggle("open",allOpen));
  this.textContent=allOpen?"Collapse all":"Expand all";
};
document.getElementById("reset").onclick=async function(){
  if(!confirm("Clear all ticks and start over?")) return;
  state={};
  try{ if(window.storage) await window.storage.delete(KEY); }catch(e){}
  refresh();
};

(async function(){ await load(); refresh(); })();
</script>
</body>
</html>
